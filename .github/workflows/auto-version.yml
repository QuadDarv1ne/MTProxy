name: Auto Version & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type (major/minor/patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

env:
  VERSION_FILE: VERSION

jobs:
  # ============================================================================
  # Auto Version Bump
  # ============================================================================
  version-bump:
    name: 🔢 Auto Version Bump
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Get current version
      id: version
      run: |
        # Try to get version from VERSION file
        if [ -f "$VERSION_FILE" ]; then
          CURRENT_VERSION=$(cat $VERSION_FILE)
        else
          # Try to get from git tag
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          # Remove 'v' prefix if present
          CURRENT_VERSION=${CURRENT_VERSION#v}
        fi
        
        echo "Current version: $CURRENT_VERSION"
        
        # Parse version components
        MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
        MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
        PATCH=$(echo $CURRENT_VERSION | cut -d. -f3 | cut -d- -f1)
        
        # Get version type from input or default to patch
        VERSION_TYPE="${{ github.event.inputs.version_type || 'patch' }}"
        
        # Bump version based on type
        case $VERSION_TYPE in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
          prerelease)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        
        # Add prerelease suffix if needed
        if [ "$VERSION_TYPE" = "prerelease" ]; then
          NEW_VERSION="$NEW_VERSION-beta.1"
        fi
        
        echo "New version: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        
        # Update VERSION file
        echo $NEW_VERSION > $VERSION_FILE

    - name: Commit version file
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore: bump version to ${{ steps.version.outputs.new_version }}'
        file_pattern: $VERSION_FILE
        tagging_message: 'v${{ steps.version.outputs.new_version }}'
        skip_fetch: false

  # ============================================================================
  # Build and Test
  # ============================================================================
  build-and-test:
    name: 🛠️ Build and Test
    runs-on: ubuntu-latest
    needs: version-bump

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev zlib1g-dev cmake

    - name: Build with CMake
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --parallel $(nproc)

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Check binaries
      run: |
        ls -lh build/bin/
        build/bin/mtproto-proxy --version || true

  # ============================================================================
  # Create Release
  # ============================================================================
  create-release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: [version-bump, build-and-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: mtproto-proxy-*
        merge-multiple: true

    - name: Generate release notes
      run: |
        echo "## 🚀 Release v${{ needs.version-bump.outputs.new_version }}" > release-notes.md
        echo "" >> release-notes.md
        echo "### Changes" >> release-notes.md
        git log --oneline --decorate=no $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD >> release-notes.md || true
        echo "" >> release-notes.md
        echo "### Installation" >> release-notes.md
        echo "" >> release-notes.md
        echo '```bash' >> release-notes.md
        echo "# Linux" >> release-notes.md
        echo "wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.version-bump.outputs.new_version }}/mtproto-proxy-linux-x64.zip" >> release-notes.md
        echo "unzip mtproto-proxy-linux-x64.zip" >> release-notes.md
        echo "chmod +x mtproto-proxy" >> release-notes.md
        echo '```' >> release-notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.version-bump.outputs.new_version }}
        name: Release v${{ needs.version-bump.outputs.new_version }}
        body_path: release-notes.md
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(needs.version-bump.outputs.new_version, 'beta') || contains(needs.version-bump.outputs.new_version, 'alpha') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Notify
  # ============================================================================
  notify:
    name: 🔔 Notify
    runs-on: ubuntu-latest
    needs: [version-bump, create-release]
    if: always()

    steps:
    - name: Release summary
      run: |
        echo "## Release v${{ needs.version-bump.outputs.new_version }}"
        echo ""
        echo "Status: ${{ needs.create-release.result }}"
        echo ""
        echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version-bump.outputs.new_version }}"
