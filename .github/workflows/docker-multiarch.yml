# GitHub Actions Workflow для сборки multi-arch Docker образов MTProxy
# Поддерживаемые архитектуры: linux/amd64, linux/arm64, linux/arm/v7

name: Docker Multi-Arch Build

on:
  push:
    branches: [master, dev]
    tags: ['v*']
  pull_request:
    branches: [master]
  schedule:
    # Еженедельная пересборка для обновлений безопасности
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================================================
  # Тесты перед сборкой
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libssl-dev \
            zlib1g-dev \
            liburing-dev \
            python3 \
            python3-pip
      
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake -DENABLE_IOURING=ON -DCMAKE_BUILD_TYPE=Release ..
      
      - name: Build
        run: |
          cd build
          make -j$(nproc)
      
      - name: Run C tests
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)
      
      - name: Run Python tests
        run: |
          cd testing
          python3 -m pytest test_metrics_collector.py -v || true

  # ===========================================================================
  # Сборка Docker образа
  # ===========================================================================
  build:
    name: Build Multi-Arch Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,arm'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Для тегов v1.0.28
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Для веток
            type=ref,event=branch
            type=ref,event=pr
            # Для master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # SHA
            type=sha,prefix=
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_TYPE=Release
            ENABLE_LTO=ON
            ENABLE_IOURING=OFF
      
      - name: Generate build report
        if: success()
        run: |
          echo "## Docker Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64, linux/arm/v7" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | sed 's/,/\n/g' | while read tag; do
            echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build time:** $(date)" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Проверка безопасности образа
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    
    permissions:
      contents: read
      packages: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================================================================
  # Интеграционные тесты Docker
  # ===========================================================================
  docker-integration-test:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Pull Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: Run Docker integration tests
        run: |
          chmod +x scripts/docker-test.sh
          ./scripts/docker-test.sh test
        continue-on-error: true
      
      - name: Cleanup
        if: always()
        run: |
          docker stop mtproxy-test 2>/dev/null || true
          docker rm mtproxy-test 2>/dev/null || true
