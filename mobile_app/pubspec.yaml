name: mtproxy_mobile
description: Кроссплатформенное приложение для управления MTProxy (Windows, Linux, macOS, iOS, Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI компоненты
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # FFI для интеграции с C-кодом
  ffi: ^2.1.0
  ffigen: ^11.0.0
  
  # Хранение настроек
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Графики для статистики
  fl_chart: ^0.66.0
  
  # Локализация
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
