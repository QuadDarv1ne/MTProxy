name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Анализ и тесты
  analyze-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile_app
        
      - name: Run analyzer
        run: flutter analyze
        working-directory: mobile_app
        
      - name: Run tests
        run: flutter test
        working-directory: mobile_app
        
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: mobile_app/coverage/lcov.info
          fail_ci_if_error: false

  # Сборка для Linux
  build-linux:
    runs-on: ubuntu-latest
    needs: [analyze-and-test]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          
      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: mobile_app
        
      - name: Build Linux release
        run: flutter build linux --release
        working-directory: mobile_app
        
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtproxy-linux
          path: mobile_app/build/linux/x64/release/bundle/

  # Сборка для Windows
  build-windows:
    runs-on: windows-latest
    needs: [analyze-and-test]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: mobile_app
        
      - name: Build Windows release
        run: flutter build windows --release
        working-directory: mobile_app
        
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtproxy-windows
          path: mobile_app/build/windows/runner/Release/

  # Сборка для macOS
  build-macos:
    runs-on: macos-latest
    needs: [analyze-and-test]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: mobile_app
        
      - name: Build macOS release
        run: flutter build macos --release
        working-directory: mobile_app
        
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtproxy-macos
          path: mobile_app/build/macos/Build/Products/Release/

  # Сборка для Android
  build-android:
    runs-on: ubuntu-latest
    needs: [analyze-and-test]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: mobile_app
        
      - name: Build Android APK
        run: flutter build apk --release
        working-directory: mobile_app
        
      - name: Build Android App Bundle
        run: flutter build appbundle --release
        working-directory: mobile_app
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mtproxy-android-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mtproxy-android-aab
          path: mobile_app/build/app/outputs/bundle/release/app-release.aab

  # Сборка для iOS
  build-ios:
    runs-on: macos-latest
    needs: [analyze-and-test]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: mobile_app
        
      - name: Build iOS
        run: flutter build ios --release --no-codesign
        working-directory: mobile_app
        
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtproxy-ios
          path: mobile_app/build/ios/iphoneos/Runner.app/

  # Создание релиза
  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Create release archives
        run: |
          cd artifacts
          zip -r mtproxy-linux.zip mtproxy-linux/
          zip -r mtproxy-windows.zip mtproxy-windows/
          zip -r mtproxy-macos.zip mtproxy-macos/
          zip -r mtproxy-android.zip mtproxy-android-apk/ mtproxy-android-aab/
          zip -r mtproxy-ios.zip mtproxy-ios/
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/mtproxy-linux.zip
            artifacts/mtproxy-windows.zip
            artifacts/mtproxy-macos.zip
            artifacts/mtproxy-android.zip
            artifacts/mtproxy-ios.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
